<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SELAH INTERNATIONAL — Premium Korean Health &amp; Wellness</title>
  <meta name="description" content="Bringing Premium Korean Health & Wellness Products to Thailand">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="index" class="hero-page">

<div id="site-header"></div>

<!-- HERO SLIDER -->
<section class="hero">
  <div class="slide on"><div class="slide-bg" data-cms-bg="home-hero-1" style="background-image:url('images/hero1.webp')"></div><div class="slide-shade"></div></div>
  <div class="slide"><div class="slide-bg" data-cms-bg="home-hero-2" style="background-image:url('images/hero2.webp')"></div><div class="slide-shade"></div></div>
  <div class="slide"><div class="slide-bg" data-cms-bg="home-hero-3" style="background-image:url('images/hero3.webp')"></div><div class="slide-shade"></div></div>
  <div class="hero-dots"><span class="hdot on"></span><span class="hdot"></span><span class="hdot"></span></div>
</section>

<!-- INTRO -->
<section class="sec">
  <div class="wrap">
    <h2 class="sec-title" data-anim="up" data-i18n="home_intro_title">SELAH INTERNATIONAL</h2>
    <div class="intro-grid" data-anim="up">
      <div class="intro-photo">
        <img data-cms-img="home-intro-photo" src="images/intro-left.webp" alt="SELAH product" loading="lazy">
      </div>
      <div class="intro-card">
        <div class="intro-card-logo">
          <img src="./images/logo/Asset%2040%4072x.webp" width="160px" alt="">
        </div>
        <p class="intro-tagline" data-i18n="home_intro_tagline">Bringing Premium Korean Health<br>&amp; Wellness Products to Thailand</p>
        <p class="intro-body" data-i18n="home_intro_body1"></p>
        <p class="intro-body" data-i18n="home_intro_body2"></p>
      </div>
    </div>
  </div>
</section>

<!-- SPECIAL EXCLUSIVE PARTNERS -->
<section class="sec" style="padding-top:0">
  <div class="wrap">
    <h2 class="sec-title" data-anim="up" data-i18n="ep_title">SPECIAL EXCLUSIVE PARTNERS</h2>
    <div class="ep-row" data-stagger>
      <div class="ep-item" data-anim="up"><img data-cms-img="home-ep-samsung" src="images/ep-samsung.webp" alt="Samsung Mechatech"></div>
      <div class="ep-item" data-anim="up"><img data-cms-img="home-ep-vms" src="images/ep-vms.webp" alt="VMS Aseptic Filling"></div>
    </div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="sec" style="padding-top:0">
  <div class="wrap">
    <h2 class="sec-title" data-anim="up" data-i18n="products_title">PRODUCTS</h2>
    <div class="products-grid" data-stagger>
      <a class="prod-card" data-anim="up" href="arabus">
        <div class="prod-card-img" data-cms-bg="home-prod-1" style="background-image:url('images/prod-arabus.webp')"></div>
        <p class="prod-label" data-i18n="prod_arabus">ARABUS COFFEE</p>
      </a>
      <a class="prod-card" data-anim="up" href="dutchmill">
        <div class="prod-card-img" data-cms-bg="home-prod-2" style="background-image:url('images/prod-dutchmill.webp')"></div>
        <p class="prod-label" data-i18n="prod_dutchmill">DUTCHMILL WILLS</p>
      </a>
      <a class="prod-card" data-anim="up" href="maeil">
        <div class="prod-card-img" data-cms-bg="home-prod-3" style="background-image:url('images/prod-maeil.webp')"></div>
        <p class="prod-label" data-i18n="prod_maeil">MAEIL SOYMILK</p>
      </a>
    </div>
  </div>
</section>

<!-- BANNER -->
<div class="banner">
  <p class="banner-l1" data-anim="fade" data-i18n="banner_l1">GOOD HEALTH BEGINS WITH</p>
  <p class="banner-l2" data-anim="fade" data-i18n="banner_l2">THE CHOICES WE MAKE EVERY DAY.</p>
</div>

<!-- WHERE TO BUY -->
<section class="sec">
  <div class="wrap-md" style="text-align:center">
    <h2 class="sec-title" data-anim="up" data-i18n="retail_title">WHERE TO BUY PRODUCTS</h2>
    <div class="retail-row" data-stagger>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="home-retail-1" src="images/retail-lotus.webp" alt="Lotus's"></div>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="home-retail-2" src="images/retail-bigc.webp" alt="Big C"></div>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="home-retail-3" src="images/retail-gourmet.webp" alt="Gourmet Market"></div>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="home-retail-4" src="images/retail-tops.webp" alt="Tops"></div>
    </div>
  </div>
</section>

<!-- RECENT HIGHLIGHTS -->
<div class="highlights-sec">
  <p class="highlights-label" data-anim="up" data-i18n="highlights">RECENT HIGHLIGHTS</p>
  <div class="highlights-grid">
    <div class="highlights-tile"><img data-cms-img="home-ig-1" src="images/feed-1.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-2" src="images/feed-2.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-3" src="images/feed-3.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-4" src="images/feed-4.jpg" alt="" loading="lazy"></div>
    <!-- <div class="highlights-tile"><img data-cms-img="home-ig-5" src="images/feed-5.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-6" src="images/feed-6.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-7" src="images/feed-7.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-8" src="images/feed-8.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-9" src="images/feed-9.jpg" alt="" loading="lazy"></div>
    <div class="highlights-tile"><img data-cms-img="home-ig-10" src="images/feed-10.jpg" alt="" loading="lazy"></div> -->
  </div>
</div>

<div id="site-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script src="js/cms.js"></script>
<script src="js/includes.js"></script>
</body>
</html>
