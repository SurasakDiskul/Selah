<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARABUS COFFEE — SELAH INTERNATIONAL</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">

<div id="site-header"></div>

<section class="prod-hero">
  <div class="prod-hero-bg" data-cms-bg="arabus-hero" style="background-image:url('images/arabus-hero.webp')"></div>
</section>

<section class="sec">
  <div class="wrap">
    <h2 class="prod-page-title" data-anim="up" data-i18n="prod_arabus">ARABUS COFFEE</h2>
    <div class="prod-detail-grid" style="margin-top:48px">
      <div class="bottle-wrap" data-anim="left">
        <img data-cms-img="arabus-photo" src="images/arabus-cup.webp" alt="Arabus Coffee" loading="lazy">
      </div>
      <div data-anim="right">
        <div class="dm-will-logo"><img data-cms-img="arabus-logo" src="images/arabus-logo.webp" alt="Arabus"></div>
        <p class="prod-lead" data-i18n="arabus_lead"></p>
        <p class="prod-body" data-i18n="arabus_body"></p>
      </div>
    </div>
  </div>
</section>

<section class="sec" style="padding-top:0">
  <div class="wrap-md" style="text-align:center">
    <h2 class="sec-title" data-anim="up" data-i18n="retail_title">WHERE TO BUY PRODUCTS</h2>
    <div class="retail-row" data-stagger>
      <div class="retail-circle" data-anim="scale"><img src="images/retail-lotus.webp" alt="Lotus's"></div>
      <div class="retail-circle" data-anim="scale"><img src="images/retail-bigc.webp" alt="Big C"></div>
      <div class="retail-circle" data-anim="scale"><img src="images/retail-gourmet.webp" alt="Gourmet Market"></div>
      <div class="retail-circle" data-anim="scale"><img src="images/retail-tops.webp" alt="Tops"></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script src="js/cms.js"></script>
<script src="js/includes.js"></script>
</body>
</html>
