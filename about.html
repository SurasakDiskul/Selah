<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABOUT — SELAH INTERNATIONAL</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="about">

<div id="site-header"></div>

<section class="page-hero">
  <div class="page-hero-bg" data-cms-bg="about-hero" style="background-image:url('images/about-hero.jpg')"></div>
</section>

<section class="sec">
  <div class="wrap-sm">
    <h2 class="about-title" data-anim="up" data-i18n="about_title">ABOUT SELAH INTERNATIONAL</h2>
    <div class="about-logo-center" data-anim="up">
      <span class="selah-mark">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="selahGradAbout" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#39CCFF"/><stop offset="1" stop-color="#13317C"/>
          </linearGradient></defs>
          <g fill="none" stroke="url(#selahGradAbout)" stroke-width="11" stroke-linejoin="round" stroke-linecap="round">
            <polyline points="26,42 50,27 74,42"/>
            <polyline points="26,42 50,27 74,42" transform="rotate(120 50 50)"/>
            <polyline points="26,42 50,27 74,42" transform="rotate(240 50 50)"/>
          </g>
        </svg>
      </span>
      <div class="about-logo-texts">
        <div class="al-name">SELAH</div>
        <div class="al-sub">INTERNATIONAL CO.,LTD.</div>
      </div>
    </div>
    <p class="body-para" data-anim="up" data-i18n="about_p1"></p>
    <p class="body-para" data-anim="up" data-i18n="about_p2"></p>
    <p class="body-para" data-anim="up" data-i18n="about_p3"></p>
    <p class="body-para" data-anim="up" data-i18n="about_p4"></p>
  </div>
</section>

<div class="about-photo" data-anim="fade">
  <img data-cms-img="about-product-photo" src="images/about-product.jpg" alt="SELAH product" loading="lazy">
</div>

<section class="sec">
  <div class="wrap-sm">
    <p class="body-para" data-anim="up" data-i18n="about_p5"></p>
    <p class="body-para" data-anim="up" data-i18n="about_p6"></p>
    <p class="body-para bold" data-anim="up" data-i18n="about_p7"></p>
  </div>
</section>

<!-- SPECIAL EXCLUSIVE PARTNERS -->
<section class="sec" style="padding-top:0">
  <div class="wrap-sm">
    <h2 class="sep-title" data-anim="up" data-i18n="sep_title">SPECIAL EXCLUSIVE PARTNERS</h2>
    <p class="body-para" data-anim="up" data-i18n="sep_p1"></p>
    <p class="body-para bold" data-anim="up" data-i18n="sep_p2"></p>
    <p class="body-para" data-anim="up" data-i18n="sep_p3"></p>
    <p class="body-para" data-anim="up" data-i18n="sep_p4"></p>
  </div>
</section>

<div class="partner-showcase" data-anim="up">
  <div class="ps-logo"><img data-cms-img="sep-samsung-logo" src="images/logo-samsung.jpg" alt="Samsung Mechatech" style="max-height:130px;max-width:400px;object-fit:contain"></div>
  <p class="ps-name" data-i18n="sep_samsung_name">SAMSUNG MECHATECH</p>
  <p class="ps-url" data-i18n="sep_samsung_url">OFFICIAL WEBSITE : SAMSUNGMECHA.COM</p>
</div>

<div class="partner-showcase" data-anim="up">
  <div class="ps-logo"><img data-cms-img="sep-vms-logo" src="images/logo-vms.jpg" alt="VMS Aseptic Filling" style="max-height:120px;max-width:400px;object-fit:contain"></div>
  <p class="ps-name" data-i18n="sep_vms_name">VMS ASEPTIC FILLING</p>
  <p class="ps-url" data-i18n="sep_vms_url">OFFICIAL WEBSITE : VMS-MASCHINENBAU.DE</p>
</div>

<section class="sec">
  <div class="wrap-sm">
    <p class="body-para" data-anim="up" data-i18n="sep_p5"></p>
    <p class="body-para" data-anim="up" data-i18n="sep_p6"></p>
    <p class="body-para" data-anim="up" data-i18n="sep_p7"></p>
  </div>
</section>

<div class="banner">
  <p class="banner-l1" data-anim="fade" data-i18n="banner_l1">GOOD HEALTH BEGINS WITH</p>
  <p class="banner-l2" data-anim="fade" data-i18n="banner_l2">THE CHOICES WE MAKE EVERY DAY.</p>
</div>

<div class="ig-sec sec-sm">
  <div class="wrap">
    <p class="ig-label" data-anim="up" data-i18n="highlights">RECENT HIGHLIGHTS</p>
    <div class="ig-grid" data-stagger>
      <div class="ig-tile" data-anim="up"><img data-cms-img="about-ig-1" src="images/ig1.jpg" alt="" loading="lazy"></div>
      <div class="ig-tile" data-anim="up"><img data-cms-img="about-ig-2" src="images/ig2.jpg" alt="" loading="lazy"></div>
      <div class="ig-tile" data-anim="up"><img data-cms-img="about-ig-3" src="images/ig3.jpg" alt="" loading="lazy"></div>
      <div class="ig-tile" data-anim="up"><img data-cms-img="about-ig-4" src="images/ig4.jpg" alt="" loading="lazy"></div>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script src="js/cms.js"></script>
<script src="js/includes.js"></script>
</body>
</html>
