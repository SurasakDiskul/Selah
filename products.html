<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRODUCTS — SELAH INTERNATIONAL</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="products">

<div id="site-header"></div>

<section class="sec">
  <div class="wrap">
    <h2 class="sec-title" data-anim="up" data-i18n="products_page_title">PRODUCTS</h2>

    <div class="timeline">
      <!-- DUTCHMILL WILLS -->
      <div class="tl-row" data-anim="up">
        <div class="tl-media"><a href="dutchmill"><img data-cms-img="tl-dutchmill-photo" src="images/prod-dutchmill.jpg" alt="DutchMill Wills" loading="lazy"></a></div>
        <div class="tl-info">
          <img class="tl-logo" data-cms-img="tl-dutchmill-logo" src="images/dm-will-logo.png" alt="DutchMill Will">
          <div class="tl-divider"></div>
          <p class="tl-year" data-i18n="py_dutchmill">2025 - PRESENT DRINKING YOGURT</p>
          <a class="tl-cta" href="dutchmill" data-i18n="tl_viewmore">VIEW DETAILS</a>
        </div>
      </div>

      <!-- MAEIL SOYMILK (reverse) -->
      <div class="tl-row reverse" data-anim="up">
        <div class="tl-media"><a href="maeil"><img data-cms-img="tl-maeil-photo" src="images/prod-maeil.jpg" alt="Maeil Soymilk" loading="lazy"></a></div>
        <div class="tl-info">
          <img class="tl-logo" data-cms-img="tl-maeil-logo" src="images/logo-maeil.png" alt="Maeil">
          <div class="tl-divider"></div>
          <p class="tl-year" data-i18n="py_maeil">2022 SOYMILK</p>
          <a class="tl-cta" href="maeil" data-i18n="tl_viewmore">VIEW DETAILS</a>
        </div>
      </div>

      <!-- ARABUS COFFEE -->
      <div class="tl-row" data-anim="up">
        <div class="tl-media"><a href="arabus"><img data-cms-img="tl-arabus-photo" src="images/prod-arabus.jpg" alt="Arabus Coffee" loading="lazy"></a></div>
        <div class="tl-info">
          <p class="pb-name" style="font-size:2rem" data-i18n="prod_arabus">ARABUS COFFEE</p>
          <div class="tl-divider"></div>
          <p class="tl-year" data-i18n="py_arabus">2015 - 2025 ARABUS COFFEE</p>
          <a class="tl-cta" href="arabus" data-i18n="tl_viewmore">VIEW DETAILS</a>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="sec" style="padding-top:0">
  <div class="wrap-md" style="text-align:center">
    <h2 class="sec-title" data-anim="up" data-i18n="retail_title">WHERE TO BUY PRODUCTS</h2>
    <div class="retail-row" data-stagger>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="prod-retail-1" src="images/retail-lotus.png" alt="Lotus's"></div>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="prod-retail-2" src="images/retail-bigc.png" alt="Big C"></div>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="prod-retail-3" src="images/retail-gourmet.png" alt="Gourmet Market"></div>
      <div class="retail-circle" data-anim="scale"><img data-cms-img="prod-retail-4" src="images/retail-tops.png" alt="Tops"></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script src="js/cms.js"></script>
<script src="js/includes.js"></script>
</body>
</html>
